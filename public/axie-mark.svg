<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Axi mark</title>
  <desc id="desc">Axi, the Mexican axolotl mascot of LifeOS — transparent mark for placing on dark UI.</desc>

  <!-- gills: feathery fronds fanning UP like a crown, behind the head -->
  <g transform="translate(25,28)">
    <g transform="rotate(-52)"><ellipse cx="0" cy="-8.5" rx="3.3" ry="8.5" fill="#FF6B9D"/><ellipse cx="0" cy="-11.5" rx="1.7" ry="3.6" fill="#FFA6C4"/></g>
    <g transform="rotate(-30)"><ellipse cx="0" cy="-9.5" rx="3.5" ry="9.5" fill="#FF6B9D"/><ellipse cx="0" cy="-12.8" rx="1.8" ry="3.8" fill="#FFA6C4"/></g>
    <g transform="rotate(-10)"><ellipse cx="0" cy="-8.5" rx="3.2" ry="8.5" fill="#FF6B9D"/><ellipse cx="0" cy="-11.5" rx="1.6" ry="3.5" fill="#FFA6C4"/></g>
  </g>
  <g transform="translate(39,28)">
    <g transform="rotate(10)"><ellipse cx="0" cy="-8.5" rx="3.2" ry="8.5" fill="#FF6B9D"/><ellipse cx="0" cy="-11.5" rx="1.6" ry="3.5" fill="#FFA6C4"/></g>
    <g transform="rotate(30)"><ellipse cx="0" cy="-9.5" rx="3.5" ry="9.5" fill="#FF6B9D"/><ellipse cx="0" cy="-12.8" rx="1.8" ry="3.8" fill="#FFA6C4"/></g>
    <g transform="rotate(52)"><ellipse cx="0" cy="-8.5" rx="3.3" ry="8.5" fill="#FF6B9D"/><ellipse cx="0" cy="-11.5" rx="1.7" ry="3.6" fill="#FFA6C4"/></g>
  </g>

  <!-- head / body -->
  <ellipse cx="32" cy="37" rx="14" ry="12.5" fill="#FF6B9D"/>
  <circle cx="23" cy="41" r="2.6" fill="#FF4D88" opacity="0.55"/>
  <circle cx="41" cy="41" r="2.6" fill="#FF4D88" opacity="0.55"/>
  <circle cx="26.8" cy="36" r="2.4" fill="#14131F"/>
  <circle cx="37.2" cy="36" r="2.4" fill="#14131F"/>
  <circle cx="27.6" cy="35.2" r="0.85" fill="#FFFFFF"/>
  <circle cx="38.0" cy="35.2" r="0.85" fill="#FFFFFF"/>
  <path d="M26.5 41.5 Q32 46.5 37.5 41.5" stroke="#14131F" stroke-width="2.2" stroke-linecap="round" fill="none"/>
</svg>
